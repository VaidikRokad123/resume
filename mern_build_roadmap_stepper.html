
<style>
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--color-border-secondary);cursor:pointer;transition:background .2s;flex-shrink:0}
.step-dot.active{background:var(--color-text-info)}
.step-dot.done{background:var(--color-text-success)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin:2px 2px 2px 0;font-weight:500}
.tag-blue{background:var(--color-background-info);color:var(--color-text-info)}
.tag-green{background:var(--color-background-success);color:var(--color-text-success)}
.tag-amber{background:var(--color-background-warning);color:var(--color-text-warning)}
.tag-red{background:var(--color-background-danger);color:var(--color-text-danger)}
.file-row{font-size:12px;font-family:var(--font-mono);padding:3px 0;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.file-row:last-child{border-bottom:none}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.col2{grid-template-columns:1fr}}
</style>

<div style="padding:1rem 0">

<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem" id="dots"></div>

<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem;margin-bottom:1rem" id="part-header">
</div>

<div class="col2" id="part-body"></div>

<div style="display:flex;gap:10px;margin-top:1.5rem;align-items:center">
  <button onclick="nav(-1)" id="btn-prev">← Prev</button>
  <button onclick="nav(1)" id="btn-next" style="margin-left:auto">Next →</button>
  <button onclick="askPart()" style="margin-left:8px">Ask Claude about this part ↗</button>
</div>

</div>

<script>
const parts = [
  {
    num:"Part 0",color:"#534AB7",
    title:"Problem statement & product overview",
    desc:"Before touching code, write out your problem statement, target users, and core value proposition. This becomes your README and your pitch.",
    tags:[["Product","amber"],["Planning","amber"]],
    files:[],
    packages:[],
    tasks:["Write 1-page problem statement","Define 3 user personas (fresh grad, career switcher, senior dev)","List all 3 screens with acceptance criteria","Choose your MERN stack versions","Set up GitHub repo + branch strategy","Write project README skeleton"],
    note:"No code in Part 0. Everything here is documentation and decisions that will save you hours later."
  },
  {
    num:"Part 1",color:"#185FA5",
    title:"Project setup & folder structure",
    desc:"Scaffold the full MERN monorepo with client and server folders, install all dependencies, set up environment variables, and configure ESLint + Prettier.",
    tags:[["Setup","blue"],["Config","blue"]],
    files:["ats-checker/","├── client/  (Vite React)","│   ├── src/components/","│   ├── src/pages/","│   ├── src/hooks/","│   ├── src/context/","│   └── src/utils/","├── server/  (Express)","│   ├── routes/","│   ├── controllers/","│   ├── models/","│   ├── middleware/","│   ├── services/","│   └── config/","└── .env.example"],
    packages:["client: vite, react, react-router-dom, axios, recharts, react-dropzone, tailwindcss","server: express, mongoose, dotenv, cors, helmet, morgan, nodemon, express-async-errors"],
    tasks:["npx create-vite@latest client","npm init for server","Configure Tailwind in client","Set up .env: MONGO_URI, JWT_SECRET, GEMINI_KEY, GOOGLE_CLIENT_ID","Add nodemon + dev scripts","Configure CORS in Express"]
  },
  {
    num:"Part 2",color:"#0F6E56",
    title:"MongoDB schema design",
    desc:"Define all five Mongoose models with proper types, indexes, and references. This is the backbone — every API and every UI component reads from these.",
    tags:[["Database","green"],["Mongoose","green"]],
    files:["models/User.js","models/Resume.js","models/Analysis.js","models/Application.js","models/JobDescription.js"],
    packages:["mongoose","bcryptjs (for password hashing)"],
    tasks:["User: name, email, password, googleId, avatar, createdAt","Resume: userId (ref), fileName, fileUrl, extractedText, versions[], createdAt","Analysis: resumeId, userId, jobDescId, atsScore, matchedKeywords[], missingKeywords[], sectionScores{}, suggestions[], rewrittenResume, latexSource","Application: userId, company, role, status (enum), resumeId, analysisId, appliedAt, notes","JobDescription: userId, title, company, rawText, createdAt","Add indexes on userId for all models"]
  },
  {
    num:"Part 3",color:"#854F0B",
    title:"Backend — auth (JWT + Google OAuth)",
    desc:"Build registration, login, and Google OAuth flow. Issue JWTs, protect routes with auth middleware, and return user session data to the frontend.",
    tags:[["Backend","amber"],["Auth","amber"]],
    files:["routes/auth.js","controllers/authController.js","middleware/authMiddleware.js","config/passport.js","services/tokenService.js"],
    packages:["jsonwebtoken","bcryptjs","passport","passport-google-oauth20","express-validator"],
    tasks:["POST /api/auth/register — hash password, create user, return JWT","POST /api/auth/login — compare hash, return JWT","GET /api/auth/google — redirect to Google consent","GET /api/auth/google/callback — create/find user, return JWT","authMiddleware: verify JWT, attach req.user","Protect all non-auth routes with authMiddleware","Return { token, user } from login/register"]
  },
  {
    num:"Part 4",color:"#993C1D",
    title:"Backend — file upload & text extraction",
    desc:"Accept PDF and DOCX uploads, store files in Cloudinary (or S3), extract plain text from both formats, and persist extracted text to MongoDB.",
    tags:[["Backend","red"],["Files","red"]],
    files:["routes/upload.js","controllers/uploadController.js","services/fileService.js","services/extractionService.js","middleware/multerMiddleware.js"],
    packages:["multer","multer-storage-cloudinary","cloudinary","pdf-parse","mammoth"],
    tasks:["Configure multer with Cloudinary storage","POST /api/upload — accept file, upload to Cloudinary, get URL","Call extractionService based on mimetype (pdf → pdf-parse, docx → mammoth)","Store Resume doc: { userId, fileName, fileUrl, extractedText }","Return resumeId + preview of extracted text to client","Handle errors: unsupported format, file too large (10MB limit)"]
  },
  {
    num:"Part 5",color:"#3C3489",
    title:"Backend — AI analysis engine (Gemini)",
    desc:"The core feature. Build the analysis route that sends resume text + job description to Gemini Pro, parses the structured JSON response, and persists the full analysis.",
    tags:[["Backend","blue"],["AI","blue"],["Core","amber"]],
    files:["routes/analysis.js","controllers/analysisController.js","services/geminiService.js","utils/promptBuilder.js","utils/responseParser.js"],
    packages:["@google/generative-ai","zod (for response validation)"],
    tasks:["POST /api/analysis — receive resumeId + jobDescText","Build structured prompt in promptBuilder.js (see note below)","Call Gemini Pro with prompt, enforce JSON-only response","Parse + validate JSON with Zod schema","Persist Analysis doc to MongoDB","GET /api/analysis/:id — return single analysis","GET /api/analysis — return user's analysis history","Prompt must return: { atsScore, matchedKeywords[], missingKeywords[], partialKeywords[], sectionScores{}, suggestions[], rewrittenResume, latexSource }"],
    note:"Gemini prompt tip: start the system prompt with 'You are an ATS expert. Respond ONLY with valid JSON matching this schema: {...}'. Give it a filled example in the prompt."
  },
  {
    num:"Part 6",color:"#185FA5",
    title:"Frontend — auth screens",
    desc:"Build the Login / Sign-Up page with Google OAuth button, email/password form, form validation, token storage, and a protected route wrapper for the rest of the app.",
    tags:[["Frontend","blue"],["React","blue"]],
    files:["pages/LoginPage.jsx","pages/RegisterPage.jsx","context/AuthContext.jsx","hooks/useAuth.js","components/ProtectedRoute.jsx","utils/api.js (axios instance)"],
    packages:["react-router-dom v6","axios","react-hook-form","@react-oauth/google"],
    tasks:["AuthContext: store token in localStorage, expose user + logout","Create axios instance with base URL + JWT interceptor","LoginPage: email + password form → POST /api/auth/login → store token","RegisterPage: same flow with name field","Google button: use @react-oauth/google GoogleLogin component → send credential to backend","ProtectedRoute: if no token, redirect to /login","Add loading spinner during auth calls","Handle 401 globally in axios interceptor — redirect to login"]
  },
  {
    num:"Part 7",color:"#534AB7",
    title:"Frontend — analysis screen",
    desc:"The showpiece screen. Drag-drop upload, job description textarea, AI result display with score gauge, keyword tags, bar chart, suggestion cards, and three output tabs.",
    tags:[["Frontend","blue"],["UI","blue"]],
    files:["pages/AnalysisPage.jsx","components/ResumeDropzone.jsx","components/JobDescInput.jsx","components/AtsScoreGauge.jsx","components/KeywordCloud.jsx","components/SectionChart.jsx","components/SuggestionCards.jsx","components/OutputTabs.jsx"],
    packages:["react-dropzone","recharts","react-syntax-highlighter (LaTeX tab)"],
    tasks:["ResumeDropzone: accept PDF/DOCX, POST to /api/upload, show filename","JobDescInput: textarea, paste-from-URL future feature","'Analyze' button → POST /api/analysis → poll or await response","AtsScoreGauge: large circular score number with color (red/amber/green)","KeywordCloud: three rows — matched (green), missing (red), partial (amber)","SectionChart: horizontal BarChart per section score (recharts)","SuggestionCards: ordered by impact, each card shows section + fix","OutputTabs: Rewritten Resume | LaTeX Source | Multi-JD Compare","Download buttons: .tex file, copy to clipboard, save to library"]
  },
  {
    num:"Part 8",color:"#0F6E56",
    title:"Frontend — application tracker dashboard",
    desc:"The command centre. KPI bento grid, score trend AreaChart, resume library with version management, and a fully sortable/filterable applications table.",
    tags:[["Frontend","green"],["Dashboard","green"]],
    files:["pages/DashboardPage.jsx","components/KpiGrid.jsx","components/ScoreTrendChart.jsx","components/ResumeLibrary.jsx","components/ApplicationTable.jsx","components/StatusBadge.jsx"],
    packages:["recharts","@tanstack/react-table","date-fns"],
    tasks:["KpiGrid: 4 cards — avg score, total apps, top score, improvement %","ScoreTrendChart: AreaChart from recharts, x=date, y=atsScore","ResumeLibrary: card grid, each card shows filename + versions dropdown","ApplicationTable: 9 columns — company, role, status, score, applied date, resume, notes, actions","Inline status dropdown (Applied → Screening → Interview → Offer → Rejected)","Row checkbox + bulk delete","Column sort on all fields via TanStack Table","Filters: status, date range, score range","Pagination: 10 rows per page"]
  },
  {
    num:"Part 9",color:"#854F0B",
    title:"Output generation, deploy & bonus features",
    desc:"Wire up PDF export, deploy the full stack, and add the three highest-value bonus features: cover letter generator, interview Q&A prep, and Stripe billing tiers.",
    tags:[["Deploy","amber"],["Extras","amber"]],
    files:["server/services/pdfService.js","client/src/utils/downloadUtils.js","vercel.json / render.yaml","server/routes/coverLetter.js","server/routes/interviewPrep.js","server/models/Subscription.js"],
    packages:["stripe","latex.js (client-side PDF preview)","nodemailer (welcome emails)"],
    tasks:["PDF: client-side latex.js render for preview, server pdflatex for full PDF","Deploy client to Vercel, server to Render (free tier)","Set all env vars in Render dashboard","Cover letter: POST /api/cover-letter — same Gemini call, different prompt","Interview prep: POST /api/interview-prep — generate 10 Qs + model answers","Stripe: Free (3 analyses/mo) vs Pro ($12/mo, unlimited)","Add usage tracking middleware — check analysisCount before calling Gemini","Email: send welcome email on register with nodemailer + Gmail SMTP"],
    note:"For Stripe, use webhook to update user.plan in MongoDB when payment succeeds. Never trust the client to report plan status."
  }
];

let cur = 0;
const completed = new Set();

function render() {
  const p = parts[cur];
  
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = parts.map((pp,i) =>
    `<div class="step-dot ${i===cur?'active':completed.has(i)?'done':''}" onclick="goTo(${i})" title="${pp.num}"></div>`
  ).join('') + `<span style="font-size:12px;color:var(--color-text-secondary);margin-left:8px">${p.num} of ${parts.length-1}</span>`;

  const hdr = document.getElementById('part-header');
  const tagHtml = (p.tags||[]).map(([t,c])=>`<span class="tag tag-${c}">${t}</span>`).join('');
  hdr.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div>
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px">${p.num}</div>
        <div style="font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px">${p.title}</div>
        <div>${tagHtml}</div>
      </div>
    </div>
    <p style="font-size:13px;color:var(--color-text-secondary);margin:10px 0 0;line-height:1.6">${p.desc}</p>
    ${p.note?`<p style="font-size:12px;color:var(--color-text-warning);margin:8px 0 0;border-left:2px solid var(--color-border-warning);padding-left:8px;border-radius:0">${p.note}</p>`:''}
  `;

  const body = document.getElementById('part-body');
  let leftHtml = '', rightHtml = '';

  if (p.tasks && p.tasks.length) {
    leftHtml = `
      <div style="background:var(--color-background-primary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:1rem">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Tasks</div>
        ${p.tasks.map(t=>`<div style="font-size:12px;color:var(--color-text-primary);padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary);line-height:1.5">${t}</div>`).join('')}
      </div>`;
  }

  let rightParts = [];
  if (p.files && p.files.length) {
    rightParts.push(`
      <div style="background:var(--color-background-primary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:1rem;margin-bottom:12px">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Files</div>
        ${p.files.map(f=>`<div class="file-row">${f}</div>`).join('')}
      </div>`);
  }
  if (p.packages && p.packages.length) {
    rightParts.push(`
      <div style="background:var(--color-background-primary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:1rem">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">npm packages</div>
        ${p.packages.map(pkg=>`<div style="font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);line-height:1.5">${pkg}</div>`).join('')}
      </div>`);
  }
  rightHtml = rightParts.join('');

  body.innerHTML = `<div>${leftHtml}</div><div>${rightHtml}</div>`;

  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').textContent = cur === parts.length-1 ? 'Done ✓' : 'Next →';
}

function nav(d) {
  if (d === 1 && cur < parts.length-1) { completed.add(cur); cur++; }
  else if (d === -1 && cur > 0) cur--;
  render();
}
function goTo(i) { cur = i; render(); }
function askPart() {
  const p = parts[cur];
  sendPrompt(`Give me the full implementation guide for ${p.num}: ${p.title} in MERN stack`);
}

render();
</script>
